apiVersion: apps/v1
kind: Deployment
metadata:
  name: autodev-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autodev-control-plane
  template:
    metadata:
      labels:
        app: autodev-control-plane
    spec:
      containers:
        - name: control-plane
          image: ghcr.io/mph-tech/autodev/control-plane:latest
          args: ["--config", "/etc/autodev/autodev.k8s.json", "serve", "--addr", ":8080"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: autodev-data
              mountPath: /var/lib/autodev
            - name: autodev-config
              mountPath: /etc/autodev
              readOnly: true
      volumes:
        - name: autodev-data
          emptyDir: {}
        - name: autodev-config
          configMap:
            name: autodev-config
